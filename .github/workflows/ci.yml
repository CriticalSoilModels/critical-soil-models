name: CI

on:
  push:
    branches: [main, architecture-prototype]
  pull_request:
    branches: [main]

jobs:
  # ── GFortran matrix (primary) ───────────────────────────────────────────────
  test-gcc:
    name: gfortran ${{ matrix.gcc-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gcc-version: [12, 13, 14]

    steps:
      - uses: actions/checkout@v4

      - name: Setup gfortran
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: gcc
          version: ${{ matrix.gcc-version }}

      - name: Setup fpm
        uses: fortran-lang/setup-fpm@v7
        with:
          fpm-version: "latest"

      - name: Cache fpm dependencies
        uses: actions/cache@v4
        with:
          path: build/dependencies
          key: fpm-deps-gcc${{ matrix.gcc-version }}-${{ hashFiles('fpm.toml') }}
          restore-keys: |
            fpm-deps-gcc${{ matrix.gcc-version }}-

      - name: Build
        run: fpm build

      - name: Test
        run: fpm test

  # ── Intel ifx ───────────────────────────────────────────────────────────────
  test-ifx:
    name: ifx (Intel oneAPI)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup ifx
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: intel
          version: "2024.2"

      - name: Setup fpm
        uses: fortran-lang/setup-fpm@v7
        with:
          fpm-version: "latest"

      - name: Cache fpm dependencies
        uses: actions/cache@v4
        with:
          path: build/dependencies
          key: fpm-deps-ifx-${{ hashFiles('fpm.toml') }}
          restore-keys: |
            fpm-deps-ifx-

      - name: Build
        run: fpm build

      - name: Test
        run: fpm test

  # ── LLVM flang ──────────────────────────────────────────────────────────────
  test-flang:
    name: flang (LLVM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup flang
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: flang
          version: "19"

      - name: Setup fpm
        uses: fortran-lang/setup-fpm@v7
        with:
          fpm-version: "latest"

      - name: Cache fpm dependencies
        uses: actions/cache@v4
        with:
          path: build/dependencies
          key: fpm-deps-flang19-${{ hashFiles('fpm.toml') }}
          restore-keys: |
            fpm-deps-flang19-

      - name: Build
        run: fpm build

      - name: Test
        run: fpm test

  # ── LFortran (experimental — allowed to fail) ────────────────────────────────
  test-lfortran:
    name: lfortran (experimental)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup lfortran
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: lfortran

      - name: Setup fpm
        uses: fortran-lang/setup-fpm@v7
        with:
          fpm-version: "latest"

      - name: Cache fpm dependencies
        uses: actions/cache@v4
        with:
          path: build/dependencies
          key: fpm-deps-lfortran-${{ hashFiles('fpm.toml') }}
          restore-keys: |
            fpm-deps-lfortran-

      - name: Build
        run: fpm build

      - name: Test
        run: fpm test
