name: Intel ifx (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-ifx-windows:
    name: ifx (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup ifx
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: intel
          version: "2025.2"

      - name: Setup fpm
        uses: fortran-lang/setup-fpm@v7
        with:
          fpm-version: "latest"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache fpm dependencies
        uses: actions/cache@v4
        with:
          path: build/dependencies
          key: fpm-deps-ifx-windows-${{ hashFiles('fpm.toml') }}
          restore-keys: |
            fpm-deps-ifx-windows-

      # Git for Windows puts a Unix `link` binary in usr/bin that shadows
      # MSVC's link.exe.  ifx calls link as a subprocess, so it must find
      # the MSVC linker first.  mingw64/bin carries ar.exe which produces
      # GNU-format archives that MSVC link.exe cannot read; strip both
      # directories so fpm uses the Intel/MSVC toolchain exclusively.
      - name: Remove Git usr/bin and mingw64/bin from PATH
        shell: pwsh
        run: |
          $paths = $env:PATH -split ';' | Where-Object {
            $_ -notmatch 'Git\\usr\\bin' -and $_ -notmatch 'mingw64\\bin'
          }
          "PATH=$($paths -join ';')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Test
        shell: cmd
        run: fpm @ifx_test --archiver llvm-ar

      - name: Test (release)
        shell: cmd
        run: fpm @ifx_release_test --archiver llvm-ar
