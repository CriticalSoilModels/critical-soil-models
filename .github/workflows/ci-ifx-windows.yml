name: Intel ifx (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-ifx-windows:
    name: ifx (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup ifx
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: intel
          version: "2025.2"

      - name: Setup fpm
        uses: fortran-lang/setup-fpm@v7
        with:
          fpm-version: "latest"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache fpm dependencies
        uses: actions/cache@v4
        with:
          path: build/dependencies
          key: fpm-deps-ifx-windows-${{ hashFiles('fpm.toml') }}
          restore-keys: |
            fpm-deps-ifx-windows-

      - name: Test
        shell: cmd
        run: fpm @ifx_test

      - name: Test (release)
        shell: cmd
        run: fpm @ifx_release_test
