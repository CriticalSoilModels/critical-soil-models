name: csm
channels:
  - conda-forge
  - defaults
dependencies:
  # Fortran compilers
  - gfortran
  - flang
  - libflang-rt           # required flang runtime (separate from the compiler package)
  - lfortran

  # Intel ifx (Linux only — comment out on other platforms)
  - ifx_linux-64
  - intel-cmplr-lib-rt   # Intel compiler runtime libraries (libimf.so etc.)
  - intel-cmplr-lic-rt

  # C compiler (needed by fpm --c-compiler gcc)
  - gcc

  # Build tools
  - fpm

  # Language server
  - fortls

  # Documentation
  - ford
  - graphviz              # ford dependency for call graphs
  - python-graphviz

  # Version control
  - git
